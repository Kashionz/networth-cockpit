<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NetWorth Cockpit：個人淨值、預算與配置回顧的跨平台財務儀表板。">
  <meta name="theme-color" content="#3A4A5C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NetWorth Cockpit">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NetWorth Cockpit</title>
  <link rel="manifest" href="manifest.json">
  <script>
    function isNetworthInstalled() {
      var inStandaloneDisplay = false;
      if (window.matchMedia) {
        inStandaloneDisplay = window.matchMedia('(display-mode: standalone)').matches;
      }
      var iOSStandalone = window.navigator && window.navigator.standalone === true;
      return inStandaloneDisplay || iOSStandalone;
    }

    window.networthInstallState = {
      promptSupported:
        ('onbeforeinstallprompt' in window) || ('BeforeInstallPromptEvent' in window),
      canInstall: false,
      installed: isNetworthInstalled(),
      lastOutcome: null,
    };
    window.deferredInstallPrompt = null;

    window.getNetworthInstallState = function () {
      window.networthInstallState = {
        promptSupported:
          ('onbeforeinstallprompt' in window) || ('BeforeInstallPromptEvent' in window),
        canInstall: !!window.deferredInstallPrompt && !isNetworthInstalled(),
        installed: isNetworthInstalled(),
        lastOutcome: window.networthInstallState.lastOutcome,
      };
      return window.networthInstallState;
    };

    function dispatchInstallStateChanged() {
      window.dispatchEvent(
        new CustomEvent('networth-install-state-changed', {
          detail: window.getNetworthInstallState(),
        }),
      );
    }

    window.addEventListener('beforeinstallprompt', function (event) {
      event.preventDefault();
      window.deferredInstallPrompt = event;
      window.networthInstallState.lastOutcome = null;
      dispatchInstallStateChanged();
    });

    window.addEventListener('appinstalled', function () {
      window.deferredInstallPrompt = null;
      window.networthInstallState.lastOutcome = 'accepted';
      dispatchInstallStateChanged();
    });

    window.promptNetworthInstall = async function () {
      if (!window.deferredInstallPrompt) {
        dispatchInstallStateChanged();
        return {
          prompted: false,
          accepted: false,
          dismissed: false,
          reason: 'Install prompt unavailable',
        };
      }

      var promptEvent = window.deferredInstallPrompt;
      promptEvent.prompt();
      var userChoice = await promptEvent.userChoice;
      var accepted = userChoice && userChoice.outcome === 'accepted';
      var dismissed = userChoice && userChoice.outcome === 'dismissed';
      window.deferredInstallPrompt = null;
      window.networthInstallState.lastOutcome = accepted ? 'accepted' : 'dismissed';
      dispatchInstallStateChanged();
      return {
        prompted: true,
        accepted: !!accepted,
        dismissed: !!dismissed,
        outcome: userChoice ? userChoice.outcome : null,
      };
    };

    window.getNetworthInstallState();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
