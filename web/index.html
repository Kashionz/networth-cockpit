<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NetWorth Cockpit：個人淨值、預算與配置回顧的跨平台財務儀表板。">
  <meta name="theme-color" content="#3A4A5C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NetWorth Cockpit">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NetWorth Cockpit</title>
  <link rel="manifest" href="manifest.json">
  <script>
    window.networthInstallState = { supported: false };
    window.deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function (event) {
      event.preventDefault();
      window.deferredInstallPrompt = event;
      window.networthInstallState.supported = true;
    });

    window.promptNetworthInstall = async function () {
      if (!window.deferredInstallPrompt) {
        return false;
      }

      window.deferredInstallPrompt.prompt();
      await window.deferredInstallPrompt.userChoice;
      window.deferredInstallPrompt = null;
      window.networthInstallState.supported = false;
      return true;
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
